spring.application.name=despacho-service
server.port=8080

# Configuración de la base de datos MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Hikari (evita caída si DB tarda en responder)
spring.datasource.hikari.initializationFailTimeout=-1
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.validationTimeout=5000
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=1
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=60000
spring.datasource.hikari.keepaliveTime=30000

# Consulta de prueba para validar conexiones
spring.datasource.hikari.connectionTestQuery=SELECT 1

# Evita fallo si DB aún no está lista
spring.sql.init.continue-on-error=true
spring.jpa.defer-datasource-initialization=true

# Hibernate
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración de Actuator y Health Checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Configuración de Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html